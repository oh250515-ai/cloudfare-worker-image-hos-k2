<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980"><defs><style>.bg{fill:#f6f7f3}.paper{fill:#fdfdfb;stroke:#d6d9cf;stroke-width:2}.ink{fill:#263026;font-family:Arial,sans-serif}.muted{fill:#667066;font-family:Arial,sans-serif}.accent{fill:#d94c3d}.soft{fill:#fff0ec;stroke:#e8a49a;stroke-width:2}.field{fill:#fbfcf9;stroke:#cbd0c5;stroke-width:2}.code{fill:#344034;font-family:monospace}.white{fill:#fff;font-family:Arial,sans-serif}.line{stroke:#d94c3d;stroke-width:3;fill:none;marker-end:url(#a)}.num{fill:#fff;font:bold 18px Arial;text-anchor:middle;dominant-baseline:middle}</style><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0l10 5-10 5z" class="accent"/></marker></defs><rect width="1600" height="980" class="bg"/><text x="84" y="86" class="ink" font-size="44" font-weight="800">Deploy to Cloudflare: điền gì ở đâu?</text><text x="84" y="126" class="muted" font-size="21">Public defaults đã có trong wrangler.jsonc. Chỉ API_KEY là bí mật cần nhập tại màn hình deploy.</text><rect x="70" y="170" width="910" height="730" rx="20" class="paper"/><text x="112" y="220" class="ink" font-size="25" font-weight="700">Create a Worker</text><text x="116" y="274" class="ink" font-size="17" font-weight="700">Project name</text><rect x="110" y="288" width="650" height="52" rx="9" class="field"/><text x="132" y="321" class="code" font-size="17">cloudfare-worker-image-hos</text><text x="116" y="380" class="ink" font-size="17" font-weight="700">API_KEY</text><rect x="110" y="394" width="650" height="52" rx="9" class="field"/><text x="132" y="427" class="code" font-size="17">tạo bằng: openssl rand -hex 32</text><text x="116" y="486" class="ink" font-size="17" font-weight="700">DEFAULT_MODEL</text><rect x="110" y="500" width="650" height="52" rx="9" class="field"/><text x="132" y="533" class="code" font-size="16">@cf/moondream/moondream3.1-9B-A2B</text><text x="116" y="592" class="ink" font-size="17" font-weight="700">ALLOWED_MODELS</text><rect x="110" y="606" width="650" height="52" rx="9" class="field"/><text x="132" y="639" class="code" font-size="17">*</text><text x="116" y="698" class="ink" font-size="17" font-weight="700">MAX_IMAGE_BYTES</text><rect x="110" y="712" width="310" height="52" rx="9" class="field"/><text x="132" y="745" class="code" font-size="17">8388608</text><text x="456" y="698" class="ink" font-size="17" font-weight="700">FETCH_TIMEOUT_MS</text><rect x="450" y="712" width="310" height="52" rx="9" class="field"/><text x="472" y="745" class="code" font-size="17">12000</text><rect x="690" y="806" width="150" height="58" rx="12" class="accent"/><text x="765" y="842" class="white" font-size="21" font-weight="700" text-anchor="middle">Deploy</text><g><circle cx="790" cy="314" r="18" class="accent"/><text x="790" y="314" class="num">1</text><path d="M810 314C925 314 978 270 1034 270" class="line"/><circle cx="790" cy="420" r="18" class="accent"/><text x="790" y="420" class="num">2</text><path d="M810 420C940 420 974 390 1034 390" class="line"/><circle cx="790" cy="526" r="18" class="accent"/><text x="790" y="526" class="num">3</text><path d="M810 526C940 526 975 510 1034 510" class="line"/><circle cx="790" cy="632" r="18" class="accent"/><text x="790" y="632" class="num">4</text><path d="M810 632C940 632 975 630 1034 630" class="line"/><circle cx="790" cy="738" r="18" class="accent"/><text x="790" y="738" class="num">5</text><path d="M810 738C940 738 975 752 1034 752" class="line"/></g><g><rect x="1034" y="210" width="500" height="120" rx="14" class="soft"/><text x="1060" y="244" class="ink" font-size="21" font-weight="700">1. Tên Worker</text><text x="1060" y="276" class="muted" font-size="17">Giữ mặc định để URL workers.dev và CI đồng bộ.</text><rect x="1034" y="348" width="500" height="120" rx="14" class="soft"/><text x="1060" y="382" class="ink" font-size="21" font-weight="700">2. API_KEY (bí mật)</text><text x="1060" y="414" class="muted" font-size="17">Client gửi qua x-api-key. Không dùng “change-me”.</text><rect x="1034" y="486" width="500" height="120" rx="14" class="soft"/><text x="1060" y="520" class="ink" font-size="21" font-weight="700">3. Model ảnh mặc định</text><text x="1060" y="552" class="muted" font-size="17">Moondream cho ảnh thưa chữ; ảnh dày nên benchmark</text><text x="1060" y="578" class="muted" font-size="17">Mistral Small 3.1 hoặc model vision mạnh hơn.</text><rect x="1034" y="624" width="500" height="120" rx="14" class="soft"/><text x="1060" y="658" class="ink" font-size="21" font-weight="700">4. Chính sách model</text><text x="1060" y="690" class="muted" font-size="17">* = mọi ID @cf/author/model. Hoặc dùng glob:</text><text x="1060" y="716" class="code" font-size="16">@cf/mistralai/*,@cf/zai-org/*</text><rect x="1034" y="762" width="500" height="120" rx="14" class="soft"/><text x="1060" y="796" class="ink" font-size="21" font-weight="700">5. Giới hạn an toàn</text><text x="1060" y="828" class="muted" font-size="17">Mặc định: ảnh 8 MiB, timeout tải ảnh 12 giây.</text></g><text x="84" y="942" class="muted" font-size="17">Ưu tiên: GitHub Secret JSON → wrangler.jsonc. Không đặt credential Cloudflare vào wrangler.jsonc.</text></svg>