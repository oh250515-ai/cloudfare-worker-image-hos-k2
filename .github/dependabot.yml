version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "03:00"
      timezone: Asia/Bangkok
    open-pull-requests-limit: 5
    versioning-strategy: increase
    groups:
      cloudflare-toolchain:
        patterns:
          - wrangler
          - "@cloudflare/*"
      test-toolchain:
        patterns:
          - vitest
          - typescript
    commit-message:
      prefix: "deps"
    labels:
      - dependencies
      - npm

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "03:15"
      timezone: Asia/Bangkok
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"
    commit-message:
      prefix: "ci"
    labels:
      - dependencies
      - github-actions
